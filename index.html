<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Titan Rivals Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 4px black; pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 8px; height: 8px; background: #00ffcc;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; box-shadow: 0 0 8px #00ffcc;
        }
        #click-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center; cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">
        <h2>TITAN RIVALS 3D</h2>
        <div>HP: <span id="hp">100</span>/100</div>
        <div>Score / RP: <span id="score">0</span></div>
        <div style="margin-top: 10px; color: #aaa;">WASD to Move | Mouse to Look | Left Click to Shoot</div>
    </div>

    <div id="click-screen">
        <h1>CLICK HERE TO PLAY IN 3D</h1>
        <p>Use your mouse to look around and WASD to walk!</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
